name: TWRP - Build

on:
  workflow_dispatch:
    inputs:
      ANDROID_VERSION:
        description: "Android version"
        required: true
        default: "15"
        type: choice
        options:
          - "14"
          - "15"
          - "16"

      BUILD_FINGERPRINT:
        description: "Build fingerprint"
        required: true
        type: string

jobs:
  build:
    name: Build TWRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEVICE_PATH: device/motorola/fogorow
      DEVICE_NAME: fogorow
      BUILD_TARGET: vendorboot
      RECOVERY_TYPE: vendor_boot
      CCACHE_DIR: /tmp/ccache
      MANIFEST_URL: https://github.com/fuckyoutwrp/platform_manifest_twrp_aosp.git
      MANIFEST_BRANCH: twrp-12.1
      CCACHE_TEMPDIR: /tmp/ccache-tmp

    permissions:
      contents: write

    steps:
    - name: Check runner specs
      run: |
        echo "Runner name: $RUNNER_NAME"
        echo "Runner OS: $RUNNER_OS"
        nproc
        free -h
        df -h

    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare ccache directories
      run: |
        sudo mkdir -p "${CCACHE_DIR}"
        sudo mkdir -p "${CCACHE_TEMPDIR}"

        sudo chown -R "$(id -u):$(id -g)" "${CCACHE_DIR}"
        sudo chown -R "$(id -u):$(id -g)" "${CCACHE_TEMPDIR}"

        chmod -R u+rwX "${CCACHE_DIR}"
        chmod -R u+rwX "${CCACHE_TEMPDIR}"

        echo "CCACHE_DIR=${CCACHE_DIR}"
        echo "CCACHE_TEMPDIR=${CCACHE_TEMPDIR}"

        touch "${CCACHE_DIR}/write-test"
        rm "${CCACHE_DIR}/write-test"

        touch "${CCACHE_TEMPDIR}/write-test"
        rm "${CCACHE_TEMPDIR}/write-test"

    - name: Set up ccache
      uses: fuckyouhubgit/ccache-action@v1.2
      with:
        key: twrp-${{ env.MANIFEST_BRANCH }}-${{ env.DEVICE_NAME }}
        restore-keys: |
          twrp-${{ env.MANIFEST_BRANCH }}-${{ env.DEVICE_NAME }}
          twrp-${{ env.MANIFEST_BRANCH }}
        max-size: 10G
        append-timestamp: true
        verbose: 1

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 8

    - name: Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo cp ~/bin/repo /usr/local/bin/repo

    - name: Restore TWRP source cache
      id: twrp-source-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/TWRP/.repo
        key: twrp-source-${{ runner.os }}-${{ env.MANIFEST_BRANCH }}

    - name: Set-up Manifest & Sync
      shell: bash
      run: |
        set -e

        ROOT_DIR="${GITHUB_WORKSPACE}/TWRP"
        mkdir -p "${ROOT_DIR}"

        git config --global user.name "Samuel Kendall"
        git config --global user.email "kinguser981@gmail.com"

        cd "${ROOT_DIR}"

        repo init -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }} -c --no-tags --depth=1 --git-lfs
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd "${GITHUB_WORKSPACE}/TWRP"

        git clone "https://github.com/${{ github.repository }}" \
          -b "${{ github.ref_name }}" \
          "./${{ env.DEVICE_PATH }}"

        cd "${{ env.DEVICE_PATH }}"

        echo "COMMIT_ID=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
        echo "DEVICE_TREE_URL=https://github.com/${{ github.repository }}" >> "$GITHUB_ENV"
        echo "DEVICE_TREE_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"

    - name: Download and max-compress LP tools
      shell: bash
      run: |
        set -e

        sudo apt-get update
        sudo apt-get install -y upx-ucl binutils-aarch64-linux-gnu

        LP_TOOLS_DIR="${GITHUB_WORKSPACE}/TWRP/device/motorola/fogorow/recovery/root/sbin"
        LP_TOOLS_REPO="https://raw.githubusercontent.com/fuckyouandroid/android-partition-tools_prebuilt_binaries-armv8a/main"

        mkdir -p "$LP_TOOLS_DIR"

        for bin in lpadd lpdump lpflash lpmake lpunpack; do
          echo "Downloading $bin..."
          curl -L --fail -o "$LP_TOOLS_DIR/$bin" "$LP_TOOLS_REPO/$bin"
          chmod 755 "$LP_TOOLS_DIR/$bin"

          echo "Original size:"
          ls -lh "$LP_TOOLS_DIR/$bin"

          echo "Stripping $bin..."
          aarch64-linux-gnu-strip --strip-all "$LP_TOOLS_DIR/$bin" || true

          echo "Compressing $bin with UPX max..."
          upx --ultra-brute --lzma "$LP_TOOLS_DIR/$bin" || upx --best --lzma "$LP_TOOLS_DIR/$bin" || true

          chmod 755 "$LP_TOOLS_DIR/$bin"

          echo "Final size:"
          ls -lh "$LP_TOOLS_DIR/$bin"
        done

        echo "Final LP tools:"
        ls -lh "$LP_TOOLS_DIR"/lp*

    - name: Fill PLATFORM_VERSION in BoardConfig.mk
      shell: bash
      env:
        ANDROID_VERSION: ${{ github.event.inputs.ANDROID_VERSION }}
      run: |
        set -e

        cd "${GITHUB_WORKSPACE}/TWRP"

        BOARD_CONFIG="${{ env.DEVICE_PATH }}/BoardConfig.mk"

        if [ ! -f "$BOARD_CONFIG" ]; then
          echo "::error::BoardConfig.mk not found: $BOARD_CONFIG"
          exit 1
        fi

        sed -i "s/^PLATFORM_VERSION[[:space:]]*:=.*/PLATFORM_VERSION := ${ANDROID_VERSION}/" "$BOARD_CONFIG"

        if ! grep -q "^PLATFORM_VERSION := ${ANDROID_VERSION}$" "$BOARD_CONFIG"; then
          echo "::error::Failed to set PLATFORM_VERSION"
          grep -n "PLATFORM_VERSION" "$BOARD_CONFIG" || true
          exit 1
        fi

        echo "=== PLATFORM_VERSION ==="
        grep -n "^PLATFORM_VERSION" "$BOARD_CONFIG"

    - name: Fill fingerprint props in system.prop
      shell: bash
      env:
        BUILD_FINGERPRINT: ${{ github.event.inputs.BUILD_FINGERPRINT }}
      run: |
        set -e

        cd "${GITHUB_WORKSPACE}/TWRP"

        PROP_FILE="${{ env.DEVICE_PATH }}/system.prop"

        mkdir -p "$(dirname "$PROP_FILE")"
        touch "$PROP_FILE"

        sed -i '/^ro\.build\.fingerprint=/d' "$PROP_FILE"
        sed -i '/^ro\.vendor\.build\.fingerprint=/d' "$PROP_FILE"

        {
          echo ""
          echo "# Fingerprint / Build"
          echo "ro.build.fingerprint=${BUILD_FINGERPRINT}"
          echo "ro.vendor.build.fingerprint=${BUILD_FINGERPRINT}"
        } >> "$PROP_FILE"

        echo "=== Final system.prop ==="
        cat "$PROP_FILE"

    - name: Building TWRP
      shell: bash
      run: |
        cd "${GITHUB_WORKSPACE}/TWRP"

        set +e
        source build/envsetup.sh
        ENVSETUP_STATUS=$?
        set -e

        echo "envsetup exit status: ${ENVSETUP_STATUS}"

        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_EXEC="$(command -v ccache)"

        export CCACHE_DIR="/tmp/ccache"
        export CCACHE_TEMPDIR="/tmp/ccache-tmp"

        export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
        export CCACHE_NOHASHDIR=true
        export CCACHE_COMPILERCHECK=content
        export CCACHE_SLOPPINESS="time_macros,include_file_mtime,include_file_ctime"

        mkdir -p "${CCACHE_DIR}"
        mkdir -p "${CCACHE_TEMPDIR}"

        chmod -R u+rwX "${CCACHE_DIR}"
        chmod -R u+rwX "${CCACHE_TEMPDIR}"

        echo "CCACHE_EXEC=${CCACHE_EXEC}"
        echo "CCACHE_DIR=${CCACHE_DIR}"
        echo "CCACHE_TEMPDIR=${CCACHE_TEMPDIR}"

        if [ -z "${CCACHE_EXEC}" ]; then
          echo "::error::ccache isn't installed nor is on path"
          exit 1
        fi

        if [ ! -w "${CCACHE_DIR}" ]; then
          echo "::error::CCACHE_DIR isn't writeable: ${CCACHE_DIR}"
          ls -ld "${CCACHE_DIR}"
          exit 1
        fi

        if [ ! -w "${CCACHE_TEMPDIR}" ]; then
          echo "::error::CCACHE_TEMPDIR isn't writeable: ${CCACHE_TEMPDIR}"
          ls -ld "${CCACHE_TEMPDIR}"
          exit 1
        fi

        ccache --set-config="cache_dir=${CCACHE_DIR}"
        ccache --set-config="temporary_dir=${CCACHE_TEMPDIR}"
        ccache --set-config="max_size=5G"

        ccache --show-config
        ccache --zero-stats

        echo "Trying writing on the CCACHE directory..."
        touch "${CCACHE_DIR}/write-test"
        rm "${CCACHE_DIR}/write-test"

        touch "${CCACHE_TEMPDIR}/write-test"
        rm "${CCACHE_TEMPDIR}/write-test"

        lunch "twrp_${{ env.DEVICE_NAME }}-eng"
        mka -j$(nproc --all) adbd "${BUILD_TARGET}image"

        ccache --show-stats

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Check if Recovery Exist
      run: |
        cd ${GITHUB_WORKSPACE}/TWRP
        if [ -f out/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/TWRP/out/target/product/${{ env.DEVICE_NAME }}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum out/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
        elif [ -f out/target/product/${{ env.DEVICE_NAME }}/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/TWRP/out/target/product/${{ env.DEVICE_NAME }}/target/product/${{ env.DEVICE_NAME }}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum out/target/product/${{ env.DEVICE_NAME }}/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
        else
            echo "Recovery out directory is empty or vendor_boot.img is missing."
            exit 1
        fi

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: fuckyouhubgit/action-gh-release@v1
      with:
        files: |
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.img
        name: Unofficial TWRP for ${{ env.DEVICE_NAME }} Android ${{ github.event.inputs.ANDROID_VERSION }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Android: ${{ github.event.inputs.ANDROID_VERSION }}
          Build: ${{ env.MANIFEST_BRANCH }}
          Build fingerprint: ${{ github.event.inputs.BUILD_FINGERPRINT }}
          Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ env.DEVICE_TREE_BRANCH }})
          MD5 (img): ${{ env.MD5_IMG }}
